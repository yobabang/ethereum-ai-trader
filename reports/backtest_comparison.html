function makeChart(canvasId, lData, dData, labels){
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {label:'LGBM-only',data:lData,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.05)',borderWidth:2,pointRadius:0,fill:true,tension:.3},
        {label:'LGBM+RL 双信号',data:dData,borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,.05)',borderWidth:2,pointRadius:0,fill:true,tension:.3},
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#a1a1aa'}}},
      scales:{
        x:{grid:{color:'#27272a'},ticks:{color:'#71717a',maxTicksLimit:15}},
        y:{grid:{color:'#27272a'},ticks:{color:'#71717a',callback:v=>'$'+v.toLocaleString()}}
      }
    }
  });
}
function makeDDChart(canvasId, lData, dData, labels){
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{

      datasets:[

    },
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#a1a1aa'}},title:{display:true,text:'回撤曲线 (%)',color:'#a1a1aa'}},
      scales:{
        x:{grid:{color:'#27272a'},ticks:{color:'#71717a',maxTicksLimit:15}},
        y:{grid:{color:'#27272a'},ticks:{color:'#71717a',callback:v=>v+'%'}}
      }
    }
  });
}

  const rd = DATA.regimes[rn];

  const d_eq = rd.d_trades.map(t=>t.equity);

  const l_dd = calcDD([O.initial_capital,...l_eq]);
  const d_dd = calcDD([O.initial_capital,...d_eq]);
  const ddLabels = [0,...labels];

  const cnv = rn==='BULL'?'chartBull':'chartBear';
  const ddCnv = rn==='BULL'?'chartBullDD':'chartBearDD';
  makeChart(cnv,[O.initial_capital,...l_eq],[O.initial_capital,...d_eq],[0,...labels]);

}
